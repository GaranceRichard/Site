version: 2

updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    # Keep Dependabot focused on security fixes; routine version bumps are handled manually.
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: Django
        update-types:
          - version-update:semver-major
    groups:
      backend-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    # Keep Dependabot focused on security fixes; routine version bumps are handled manually.
    open-pull-requests-limit: 0
    groups:
      frontend-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
