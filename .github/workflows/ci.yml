name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "ci=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git ls-files)"
          else
            changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
          fi

          backend=false
          frontend=false
          ci=false

          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue

            case "${file}" in
              backend/*|docker-compose*.yml)
                backend=true
                ;;
            esac

            case "${file}" in
              frontend/*|docker-compose*.yml)
                frontend=true
                ;;
            esac

            case "${file}" in
              .github/workflows/*|.github/actions/*)
                ci=true
                ;;
            esac
          done <<< "${changed_files}"

          echo "backend=${backend}" >> "$GITHUB_OUTPUT"
          echo "frontend=${frontend}" >> "$GITHUB_OUTPUT"
          echo "ci=${ci}" >> "$GITHUB_OUTPUT"

  backend_unit:
    name: Backend (Django unit)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: backend
    env:
      PIP_INDEX_URL: https://pypi.org/simple
      DJANGO_ENV: development
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_ENABLE_JWT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup backend toolchain
        uses: ./.github/actions/setup-backend

      - name: Run tests with coverage (>= 80%)
        run: |
          python -m coverage run manage.py test
          python -m coverage report --fail-under=80

      - name: Validate OpenAPI schema
        run: python manage.py spectacular --validate --fail-on-warn

  backend_lint:
    name: Backend lint (ruff + black)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup backend toolchain
        uses: ./.github/actions/setup-backend

      - name: Ruff
        run: |
          python -m ruff check \
            contact/views.py \
            contact/serializers.py \
            contact/image_upload.py \
            contact/pagination.py \
            contact/reference_cache.py

      - name: Black (check)
        run: |
          python -m black --check --diff --verbose .

  frontend_unit:
    name: Frontend (Next/Vitest)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_BACKOFFICE_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage gate (>= 80%)
        run: npm run test:coverage

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e_smoke:
    name: E2E smoke (push)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push'
    env:
      PIP_INDEX_URL: https://pypi.org/simple
      DJANGO_ENV: development
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_ENABLE_JWT: "true"
      DJANGO_E2E_MODE: "true"
      DJANGO_CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_BACKOFFICE_ENABLED: "true"
      E2E_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup backend toolchain
        uses: ./.github/actions/setup-backend

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run smoke E2E tests
        working-directory: frontend
        run: |
          npx playwright test tests/contact.spec.ts
          npx playwright test tests/backoffice.spec.ts --grep "backoffice login fails with invalid credentials"

      - name: Upload logs and traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-debug-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            backend-server.log
            frontend-server.log
            frontend/playwright-report
            frontend/test-results

  e2e_full:
    name: E2E full (nightly/manual)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - backend_unit
      - frontend_unit
    env:
      PIP_INDEX_URL: https://pypi.org/simple
      DJANGO_ENV: development
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_ENABLE_JWT: "true"
      DJANGO_E2E_MODE: "true"
      DJANGO_CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_BACKOFFICE_ENABLED: "true"
      E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
      E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
      E2E_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup backend toolchain
        uses: ./.github/actions/setup-backend

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run full E2E suite
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload logs and traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-debug-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            backend-server.log
            frontend-server.log
            frontend/playwright-report
            frontend/test-results

  backend_integration:
    name: "Backend (Integration: Postgres)"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d ci_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PIP_INDEX_URL: https://pypi.org/simple
      DJANGO_ENV: production
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_ENABLE_JWT: "true"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_ALLOW_INSECURE_ORIGINS_IN_PROD: "true"
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DJANGO_SECURE_SSL_REDIRECT: "false"
      DJANGO_DB_SSL_REQUIRE: "false"
      DATABASE_URL: postgresql://ci_user:ci_pass@127.0.0.1:5432/ci_db
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup backend toolchain
        uses: ./.github/actions/setup-backend

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests (Postgres)
        run: python manage.py test

  docker_build:
    name: Docker build (main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t monsite-backend ./backend

      - name: Build frontend image
        run: docker build -t monsite-frontend ./frontend
