name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  enable_auto_merge:
    name: Enable auto-merge for Dependabot security PRs
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Capture Dependabot PR number
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            const dependabotPr = prs.find((pr) => pr.user?.login === "dependabot[bot]");
            core.setOutput("number", dependabotPr ? String(dependabotPr.number) : "");

      - name: Enable auto-merge
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge --repo "$REPO" --auto --squash "$PR_NUMBER"
